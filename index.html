<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <title>Motion sandbox</title>
    <style>
      html,
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      .carousel {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 0;
      }
      .carousel-slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        z-index: 0;
        transition: opacity 0.35s ease;
      }
      .carousel-slide.is-active {
        opacity: 1;
        pointer-events: auto;
        z-index: 1;
      }
      .carousel-slide canvas {
        display: block;
        cursor: grab;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #slide-box.is-grabbing canvas {
        cursor: grabbing;
      }
      @keyframes grab-invite {
        0%,
        100% {
          outline-color: rgba(130, 190, 255, 0.1);
        }
        50% {
          outline-color: rgba(130, 190, 255, 0.32);
        }
      }
      #slide-box:not(.is-grabbing) canvas:hover {
        outline: 1px solid rgba(130, 190, 255, 0.2);
        outline-offset: -1px;
        animation: grab-invite 2.4s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        #slide-box:not(.is-grabbing) canvas:hover {
          animation: none;
          outline-color: rgba(130, 190, 255, 0.22);
        }
      }
      .carousel-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom));
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.55));
        pointer-events: auto;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .carousel-nav button {
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(30, 30, 35, 0.85);
        color: #e8e8ee;
        font-size: 1.35rem;
        line-height: 1;
        min-width: 2.75rem;
        min-height: 2.75rem;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 999px;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .carousel-nav button:hover {
        background: rgba(55, 55, 65, 0.95);
      }
      .carousel-dots {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .carousel-dot {
        box-sizing: border-box;
        min-width: 2.75rem;
        min-height: 2.75rem;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 999px;
        border: none;
        padding: 0;
        background: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.35) 0 18%,
          transparent 19%
        );
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .carousel-dot.is-current {
        background: radial-gradient(
          circle at center,
          rgba(130, 190, 255, 0.95) 0 22%,
          transparent 23%
        );
        transform: scale(1.08);
      }
      .carousel-label {
        font: 500 0.72rem system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        min-width: 5rem;
        text-align: center;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="carousel" aria-roledescription="carousel">
      <section
        class="carousel-slide is-active"
        id="slide-box"
        data-title="Box"
        aria-label="3D box and ring"
        aria-hidden="false"
      ></section>
      <section
        class="carousel-slide"
        id="slide-waterfall"
        data-title="Wash"
        aria-label="Color waterfall"
        aria-hidden="true"
      ></section>
      <section
        class="carousel-slide"
        id="slide-flow"
        data-title="Flow"
        aria-label="Particle flow field"
        aria-hidden="true"
      ></section>
    </div>
    <nav class="carousel-nav" aria-label="Sketch navigation">
      <button type="button" id="carousel-prev" aria-label="Previous sketch">
        ‹
      </button>
      <span class="carousel-label" id="carousel-label">Box</span>
      <div class="carousel-dots" role="tablist">
        <button
          type="button"
          class="carousel-dot is-current"
          data-slide="0"
          role="tab"
          aria-selected="true"
          aria-label="Box sketch"
        ></button>
        <button
          type="button"
          class="carousel-dot"
          data-slide="1"
          role="tab"
          aria-selected="false"
          aria-label="Color wash"
        ></button>
        <button
          type="button"
          class="carousel-dot"
          data-slide="2"
          role="tab"
          aria-selected="false"
          aria-label="Flow field"
        ></button>
      </div>
      <button type="button" id="carousel-next" aria-label="Next sketch">
        ›
      </button>
    </nav>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script src="sketch-box.js"></script>
    <script src="sketch-waterfall.js"></script>
    <script src="sketch-flow.js"></script>
    <script src="carousel.js"></script>
  </body>
</html>
