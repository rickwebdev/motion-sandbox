<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <title>p5.js WebGL starter</title>
    <style>
      html,
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      #p5-root {
        position: fixed;
        inset: 0;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: block;
        overflow: hidden;
      }
      /* Let p5 set canvas width/height in px — scaling here desyncs WebGL viewport from the framebuffer (scene stuck in a corner). */
      #p5-root canvas {
        display: block;
        cursor: grab;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #p5-root.is-grabbing canvas {
        cursor: grabbing;
      }
      @keyframes grab-invite {
        0%,
        100% {
          outline-color: rgba(130, 190, 255, 0.1);
        }
        50% {
          outline-color: rgba(130, 190, 255, 0.32);
        }
      }
      #p5-root:not(.is-grabbing) canvas:hover {
        outline: 1px solid rgba(130, 190, 255, 0.2);
        outline-offset: -1px;
        animation: grab-invite 2.4s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        #p5-root:not(.is-grabbing) canvas:hover {
          animation: none;
          outline-color: rgba(130, 190, 255, 0.22);
        }
      }
    </style>
  </head>
  <body>
    <main id="p5-root"></main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
